name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Typecheck
        run: bun run typecheck
      - name: Build bundle
        run: bun run build
      - name: Ensure bundle is committed and up to date
        run: git diff --exit-code -- index.js || (echo "index.js is stale — run 'bun run build' and commit it" && exit 1)
